<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/mainConfigurations.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link
      rel="stylesheet"
      media="(max-width : 750px)"
      href="csss/mobile-adaptation.css"
    />

    <script src="js/getCaracters.js" defer></script>
    <script src="js/characterAnimation.js" defer></script>
    <script src="js/game.js" defer></script>
    <!-- <script src="js/responsive-config" defer></script> -->

    <title>Extreme Jump Game</title>
  </head>
  <body onload="HideLoader()">
    <div id="loader-container">
      <div class="custom-loader"></div>
      <div id="change-orientation">
        Vire a tela de seu telefone para melhor experiencia
      </div>
    </div>

    <main class="game-window" id="game-window">
      <div id="gameOver">
        <p>Game Over</p>
        <button id="restart">Reiniciar</button>
      </div>
      <button id="jumpButton">
        <img src="images/jump-button.png" alt="jump-button" />
      </button>

      <div id="main-menu">
        <h1 class="game-name">Extreme Jump Race</h1>
        <button id="start-game">Jogar</button>
        <a href="creditos.html" class="credits">Creditos</a>
      </div>

      <section class="select-character" id="select-character">
        <h1>Selecione um personagem</h1>

        <div id="characters-container"></div>
      </section>

      <img src="images/nuvens.webp" alt="" id="clouds" />
      <img src="images/city.png" alt="" id="city" />
      <img src="images/car.png" alt="" id="car" />
      <img src="" alt="" id="player" />
    </main>
  </body>
</html>
