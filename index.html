<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/mobile-adaptation.css"/>
    <link rel="stylesheet" href="css/mainConfigurations.css" />
    <link rel="stylesheet" href="css/animations.css" />

    <title>Extreme Jump Race</title>
  </head>

  <body onload="HideLoader()">

    <!-- Loader / Carregador -->
    <div id="loader-container">
      <div class="custom-loader"></div>
    </div>

    <!-- Game window / Janela do Jogo -->

    <main class="game-window" id="game-window">

      <!-- Game Over Screen / Tela de Game Over -->
      <div id="gameOver">
        <p>Game Over</p>
        <button id="restart">Reiniciar</button>
      </div>

      <!-- Jump Button / Botão de Pulo -->

      <button id="jumpButton">
        <img src="images/jump-button.png" alt="jump-button" />
      </button>

      <!-- Main Menu / Menu principal -->

      <div id="main-menu">
        <h1 class="game-name">Extreme Jump Race</h1>
        <button id="start-game">Jogar</button>
        <a href="https://github.com/JG-Stadler/Extreme-Jump-Race"
        target="_blank">Repositorio do projeto</a>
        <a href="#" class="credits" onclick="AlertCredits()">Creditos</a>
      </div>

      <!-- Game Components / Componentes do Jogo -->
 
      <img src="images/nuvens.webp" alt="" id="clouds" />
      <img src="images/city.png" alt="" id="city" />
      <img src="images/car-3.png" alt="" id="car" />
      <img src="images/player-runing.gif" alt="player" id="player" />
    </main>

    <p id="notice-screen-orientation"
    style="color: rgb(189, 189, 189);">
    Mantenha seu aparelho na horizontal para melhor experiencia</p>

    <!-- Game Music / Sound effects -->

    <audio id="game-music" 
    src="audio/And the Journey Begins_(MP3_160K).mp3"
    loop style="display: none;"></audio>

    <audio id="jump-sound-effect"
    src="audio/Retro 8 bit Jump Sound Effect for FREE__ iggchan(MP3_160K).mp3"
     style="display: none;"></audio>

     <audio id="explosion_sound"
     src="audio/☑️ÁUDIO DE GAME_ SOM DE GAME EXPLOSÃO_ EFEITO ESPECIAL DE EXPLOSÃO EM GAMING(M4A_128K).m4a"
      style="display: none;"></audio>

      <audio id="game_over_music"
      src="audio/Arcade retro game over sound effect (FREE)(M4A_128K).m4a"
       style="display: none;"></audio>

    <!-- Temporary Script / Script temporário -->
    <!-- Script destinado ao aviso sobre o desenvolvimento da pagina de créditos -->
    <script>
      function AlertCredits(){
        window.alert("Disponivel em breve")
      }
    </script>

        <!-- scripts -->

        <script src="js/start_game.js"></script>
        <script src="js/game.js"></script>
        <script src="js/gameOver.js"></script>
        <script src="js/audios.js"></script>

        <script>
          function HideLoader(){
            const Loader = document.getElementById("loader-container");
            Loader.style.display = "none";
          }
        </script>

        <script>
          const NoticeOrientation = document.getElementById("notice-screen-orientation");
          const body = document.querySelector("body");
          if(body.clientWidth > 800){
            NoticeOrientation.style.display = "none";
          }
        </script>
  </body>
</html>
